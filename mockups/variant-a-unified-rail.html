<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>מוקאפ A — שורת מצב מאוחדת (נקי)</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_shared-mock.css" />
  <style>
    :root {
      --rail-bg: rgba(15, 23, 42, 0.94);
      --line-hair: rgba(148, 163, 184, 0.14);
      --surface: rgba(255, 255, 255, 0.04);
      --accent: #f59e0b;
      --accent-soft: rgba(245, 158, 11, 0.14);
      --text-strong: #f8fafc;
    }
    .rail-wrap {
      flex-shrink: 0;
      background: var(--rail-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line-hair);
    }
    .rail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.62rem 1rem;
      padding-top: calc(0.5rem + var(--safe-top));
    }
    .rail-start {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
    }
    .btn-home {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line-hair);
      background: var(--surface);
      color: var(--text-strong);
      display: grid;
      place-items: center;
      cursor: default;
    }
    .btn-home svg {
      width: 20px;
      height: 20px;
      opacity: 0.92;
    }
    .context {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
    }
    .context-kicker {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .context-main {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-strong);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rail-end {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      flex-shrink: 0;
    }
    .lives {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .lives span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(248, 113, 113, 0.35);
      border: 1px solid rgba(248, 113, 113, 0.55);
    }
    .lives span.on {
      background: #f87171;
      border-color: #f87171;
      box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.25);
    }
    .score-block {
      text-align: end;
      min-width: 4.5rem;
    }
    .score-block .lbl {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .score-block .val {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-strong);
      font-variant-numeric: tabular-nums;
      line-height: 1.15;
    }
    .rail-track {
      height: 2px;
      margin: 0 1rem 0.55rem;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }
    .rail-track > span {
      display: block;
      height: 100%;
      width: 30%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), #34d399);
    }
    .chip-float {
      position: absolute;
      top: 14px;
      right: 14px;
      left: 14px;
      z-index: 2;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    .chip {
      pointer-events: auto;
      max-width: 100%;
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line-hair);
      border-radius: 14px;
      padding: 0.65rem 1.15rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
    }
    .chip .chip-lbl {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .chip .chip-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .btn-fake {
      background: var(--text-strong);
      color: #0f172a;
      font-weight: 700;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.25);
    }
    .btn-fake:hover {
      filter: brightness(1.03);
    }
  </style>
</head>
<body>
  <a class="mock-label" href="index.html">← גלריית מוקאפים · A</a>
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="rail-wrap">
      <div class="rail-row">
        <div class="rail-start">
          <div class="btn-home" aria-hidden="true" title="מסך בית">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9.5 12 3l9 6.5" />
              <path d="M5 10v9h5v-5h4v5h5v-9" />
            </svg>
          </div>
          <div class="context">
            <span class="context-kicker">איתור שכונה · ללא שמות</span>
            <span class="context-main">רמה 2 · שאלה 3 מתוך 10</span>
          </div>
        </div>
        <div class="rail-end">
          <div class="lives" title="חיים" aria-hidden="true">
            <span class="on"></span><span class="on"></span><span class="on"></span>
          </div>
          <div class="score-block">
            <div class="lbl">ניקוד</div>
            <div class="val">1,240</div>
          </div>
        </div>
      </div>
      <div class="rail-track" aria-hidden="true"><span></span></div>
    </div>
    <div class="map-fake" style="flex: 1">
      <div class="chip-float">
        <div class="chip">
          <div class="chip-lbl">מטרה</div>
          <div class="chip-name">המושבה הגרמנית</div>
        </div>
      </div>
      <span class="map-pin-deco"></span>
      <button type="button" class="btn-fake">אשר בחירה</button>
    </div>
  </div>
</body>
</html>
